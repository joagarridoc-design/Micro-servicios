spring.application.name=ms-review
server.port=8090
spring.datasource.url=jdbc:mysql://localhost:3306/db_reviews?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
# En Laragon la contraseña por defecto viene vacía (borra lo que tengas y déjalo así):
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate (JPA) para que cree las tablas automáticamente
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Desactivar Flyway temporalmente para evitar el error "Communications link failure"
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true