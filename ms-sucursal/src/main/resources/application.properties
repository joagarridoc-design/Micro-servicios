spring.application.name=ms-sucursal
server.port=8089


# 2. Configuración de Base de Datos 

# Nota: createDatabaseIfNotExist=true crea la base de datos automáticamente si no existe
spring.datasource.url=jdbc:mysql://localhost:3306/db_sucursal?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# 3. Configuración de JPA / Hibernate

# Usa "validate" porque Flyway será el encargado de crear/modificar las tablas
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true


# 4. Configuración de Flyway

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true