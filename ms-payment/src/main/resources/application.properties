spring.application.name=ms-payment
server.port=8082
# Conexión a la Base de Datos (Laragon)
#  la base de datos se llama db_reviews (puerto 3306)
spring.datasource.url=jdbc:mysql://localhost:3306/db_payment?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.flyway.clean-disabled=false
spring.flyway.baseline-on-migrate=true
