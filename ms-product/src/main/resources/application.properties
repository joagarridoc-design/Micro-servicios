spring.application.name=ms-product
# Los MicroServicios a nivel Local no pueden tener el mismo puerto
# es por este motivo que se asigna un puerto diferente a cada microservicio
# 8082 = ms-juegos
# 8081 = ms-usuarios
server.port=8082

# Configuración de BD (crea la bd incluso si no existe)
spring.datasource.url=jdbc:mysql://localhost:3306/db_productos?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.flyway.clean-disabled=false
spring.flyway.baseline-on-migrate=true